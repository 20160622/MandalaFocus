<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>MandalaFocus</title>

  <!-- ホーム画面に追加（iOS / Android）で全画面アプリ風に起動 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MandalaFocus" />
  <meta name="theme-color" content="#0b0b0e" />
  <link rel="apple-touch-icon" href="icon-180.png?v=15" />
  <link rel="icon" type="image/png" href="icon-192.png?v=15" />
  <link rel="manifest" href="manifest.webmanifest?v=15" />

  <link rel="stylesheet" href="style.css?v=25" />
  <!-- p5.js (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <!-- 上部HUD：進化の階梯 -->
  <div id="hud">
    <span id="hud-stage">階梯: 種</span>
    <div id="hud-progress" title="次の開放まで"><div id="hud-bar"></div></div>
    <span id="hud-light">光 0</span>
    <span id="hud-collection">◉ 1/6</span>
  </div>

  <!-- 開放などの通知 -->
  <div id="toast"></div>

  <!-- 禅モードの操作ヒント（禅モード中も表示される） -->
  <div id="zenhint">長押し ／ Esc で戻る</div>

  <!-- 隅のメニュー（≡ で開閉） -->
  <div id="ui">
    <div id="menu-panel">
      <div class="menu-group">
        <span class="menu-label">表示</span>
        <button id="btn-palette" title="階調（トーン）を切り替え (P)">◑ 階調</button>
        <button id="btn-pattern" title="モチーフを切り替え（開放済みのみ） (M)">❖ モチーフ</button>
        <button id="btn-shuffle" title="模様を一新 (Space)">⟳ 一新</button>
        <button id="btn-paint" title="塗り続けるモード：着彩が退色しない (B)">🖌 塗り続け</button>
        <button id="btn-clear" title="描いた線と着彩を消す (C)">⌫ 消す</button>
        <button id="btn-fullscreen" title="全画面表示の切り替え">⛶ 全画面</button>
      </div>
      <div class="menu-group">
        <span class="menu-label">集中・音</span>
        <button id="btn-zen" title="集中モード：UIを隠して絵だけに。画面長押しで解除 (Z／Esc)">🧘 禅</button>
        <button id="btn-focus" title="集中タイマー：3→5→10分→オフ (F)">⏱ 集中</button>
        <button id="btn-sound" title="静かな音のオン/オフ (S)">🔕 音</button>
        <button id="btn-soundtype" title="背景音の種類を切替（和音・荘厳・豊麗・温和）">🎵 音色</button>
      </div>
      <div class="menu-group">
        <span class="menu-label">共有</span>
        <button id="btn-share" title="今の曼荼羅をコードで共有">⤴ 共有</button>
        <button id="btn-load" title="共有コードを読み込む">📥 読込</button>
      </div>
      <p class="menu-hint">タップ＝波紋＋着彩／なぞる＝描く・奏でる<br>「塗り続け」で色が消えなくなります</p>
    </div>
    <button id="btn-menu" title="メニューを開閉">≡ メニュー</button>
  </div>

  <!-- スケッチ本体 -->
  <script src="src/palettes.js?v=24"></script>
  <script src="src/progression.js?v=24"></script>
  <script src="src/interaction.js?v=24"></script>
  <script src="src/audio.js?v=27"></script>
  <script src="src/main.js?v=24"></script>
</body>
</html>
